<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Offline — DET MONITORING APPLICATION</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#f2f7fb; color:#123; }
    .wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { max-width:520px; background:#fff; border:1px solid #dbe6ef; border-radius:12px; padding:24px; }
    h1 { margin:0 0 10px; font-size:22px; }
    p { margin:0 0 10px; line-height:1.5; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>You are offline</h1>
      <p>Network is unavailable right now. Reconnect and refresh to continue.</p>
      <p>For security and freshness, live dashboards and API data are always loaded from network.</p>
    </div>
  </div>
</body>
</html>
