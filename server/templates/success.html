<!DOCTYPE html>

</head>

<body class="auth-bg">

    <section class="auth-card" aria-live="polite">
      <div class="auth-head">
        <img class="logo big" src="/static/icons/newicon.png?v={{ static_version }}" alt="DET logo">
        <div>
          <h1>Upload Successful</h1>
          <div class="small-muted">Meter image uploaded and processed.</div>

      {% include "_partials/install_hint.html" %}
