<div class="modal" id="appAlertsModal" aria-hidden="true">
  <div class="modal-card alerts-live-modal-card" style="width:min(860px,96vw);">
    <div class="modal-head">
      <div>
        <div class="modal-title">Live Alert Center</div>
        <div class="small-muted" id="appAlertsMeta">Latest notifications</div>
      </div>
      <div class="actions">
        <button class="btn small" type="button" id="appAlertsRefresh">Refresh</button>
        <button class="btn" type="button" id="appAlertsClose">Done</button>
      </div>
    </div>
    <div class="modal-body">
      <div id="appAlertsSummary" class="alerts-summary"></div>
      <div id="appAlertsList" class="alerts-list"></div>
    </div>
  </div>
</div>
